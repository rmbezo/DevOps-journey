deploymentMode: SingleBinary

loki:
  auth_enabled: false
  storage:
    type: filesystem
    bucketNames:
      chunks: "chunks"
      ruler: "ruler"
      admin: "admin"

singleBinary:
  replicas: 1
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

gateway:
  enabled: false
lokiCanary:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# ВСЕ SimpleScalable = 0
simpleScalable:
  write:
    replicas: 0
  read:
    replicas: 0
  backend:
    replicas: 0
