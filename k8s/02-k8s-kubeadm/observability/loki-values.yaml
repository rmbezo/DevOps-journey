deploymentMode: SingleBinary

simpleScalable:
  write:
    replicas: 0
  read: 
    replicas: 0
  backend:
    replicas: 0

# singleBinary
singleBinary:
  replicas: 1
  persistence:
    enabled: false

# Отключаем кэши
loki-chunks-cache:
  enabled: false
loki-results-cache:
  enabled: false
gateway:
  enabled: false

loki:
  auth_enabled: false
  useTestSchema: true  
  storage:
    bucketNames:
      chunks: "chunks"
      ruler: "ruler"
      admin: "admin"

persistence:
  enabled: false