deploymentMode: SingleBinary

loki:
  auth_enabled: false
  useTestSchema: true
  storage:              # ← ДОБАВЬ ЭТУ СЕКЦИЮ ПОЛНОСТЬЮ!
    bucketNames:
      chunks: "chunks"
      ruler: "ruler" 
      admin: "admin"

singleBinary:
  replicas: 1
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Остальное оставь как есть...
gateway:
  enabled: false
lokiCanary:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
