loki:
  auth_enabled: false
  storage:
    type: filesystem
    bucketNames:          
      chunks: "chunks"
      ruler: "ruler"      
      admin: "admin"      
  schemaConfig:
    configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h